<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 375">
  <!-- Northumberland County Flag: "Paly of eight Or and Gules per fesse embattled all counterchanged" -->
  <!-- Top half: Gold and Red stripes -->
  <rect x="0" y="0" width="75" height="187.5" fill="#FFD700"/>
  <rect x="75" y="0" width="75" height="187.5" fill="#CF142B"/>
  <rect x="150" y="0" width="75" height="187.5" fill="#FFD700"/>
  <rect x="225" y="0" width="75" height="187.5" fill="#CF142B"/>
  <rect x="300" y="0" width="75" height="187.5" fill="#FFD700"/>
  <rect x="375" y="0" width="75" height="187.5" fill="#CF142B"/>
  <rect x="450" y="0" width="75" height="187.5" fill="#FFD700"/>
  <rect x="525" y="0" width="75" height="187.5" fill="#CF142B"/>
  <!-- Bottom half: Red and Gold stripes (counterchanged) -->
  <rect x="0" y="187.5" width="75" height="187.5" fill="#CF142B"/>
  <rect x="75" y="187.5" width="75" height="187.5" fill="#FFD700"/>
  <rect x="150" y="187.5" width="75" height="187.5" fill="#CF142B"/>
  <rect x="225" y="187.5" width="75" height="187.5" fill="#FFD700"/>
  <rect x="300" y="187.5" width="75" height="187.5" fill="#CF142B"/>
  <rect x="375" y="187.5" width="75" height="187.5" fill="#FFD700"/>
  <rect x="450" y="187.5" width="75" height="187.5" fill="#CF142B"/>
  <rect x="525" y="187.5" width="75" height="187.5" fill="#FFD700"/>
  <!-- Embattled line (battlements) across the middle -->
  <!-- Top colour extends down into battlements on odd stripes -->
  <rect x="0" y="187.5" width="75" height="37.5" fill="#FFD700"/>
  <rect x="150" y="187.5" width="75" height="37.5" fill="#FFD700"/>
  <rect x="300" y="187.5" width="75" height="37.5" fill="#FFD700"/>
  <rect x="450" y="187.5" width="75" height="37.5" fill="#FFD700"/>
  <!-- Bottom colour extends up into battlements on even stripes -->
  <rect x="75" y="150" width="75" height="37.5" fill="#FFD700"/>
  <rect x="225" y="150" width="75" height="37.5" fill="#FFD700"/>
  <rect x="375" y="150" width="75" height="37.5" fill="#FFD700"/>
  <rect x="525" y="150" width="75" height="37.5" fill="#FFD700"/>
</svg>
